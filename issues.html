<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
        <!-- tailwind+daisyui -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <!-- font awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

        <style>
         .issue-count-section{
             display: flex;
             gap: 10px;
             align-items: center;
         }

         .issue-count-section .section-img{
             background-color: #eef2ff;
             padding: 8px;
             border-radius: 50%;
         }

         .issue-count-section .section-content{
             display: flex;
             flex-direction: column;
         }

         .issue-count-section .section-content p{
             color: gray;
         }

         .indicator{
             display: inline-block;
             width: 15px;
             height: 15px;
             border-radius: 50%;
         }
        </style>

        <title>Issues</title>
    </head>
    <body>
        <header>
            <div class="flex justify-between navbar bg-base-100 shadow-sm">
                <div class="flex items-center">
                    <img alt="" src="./assets/github-logo.png" class="h-8 w-8 md:h-12 md:w-12" />
                    <a class="btn btn-ghost h-min text-xl hidden sm:inline">Github Issues Tracker</a>
                    <a class="btn btn-ghost text-sm text-left sm:hidden">Github Issues<br>Tracker</a>
                </div>
                <div class="flex gap-2">
                    <input type="text" placeholder="Search" class="input input-sm input-bordered w-24 md:w-auto" />
                    <button class="btn btn-soft btn-sm btn-primary"><i class="fa-solid fa-plus"></i><span class="hidden sm:inline"> New Issue</span></button>
                </div>
            </div>
        </header>

        <main>
            <div class="tabs tabs-box p-6 md:p-8 lg:px-[100px] lg:py-[60px]">
                <input type="radio" name="status_tabs" class="tab text-primary" aria-label="All" checked="checked" />
                <div class="tab-content bg-base-100 border-base-300">
                    <div id="all-tab-overview" class="flex flex-col-reverse gap-1 sm:flex-row sm:justify-between p-3 border-transparent border-1 border-b-gray-300">
                        <div class="issue-count-section">
                            <div class="section-img">
                                <img alt="" src="./assets/Aperture.png"/>
                            </div>
                            <div class="section-content">
                                <h3 class="font-semibold text-lg"><span id="all-issue-count">50</span> issues</h3>
                                <p>Track and manage your project issues</p>
                            </div>
                        </div>
                        <div class="status-section flex self-end sm:self-center gap-4">
                            <div class="status-open flex items-center gap-2">
                                <span class="bg-green-500 indicator"></span>
                                <p>Open</p>
                            </div>
                            <div class="status-closed flex items-center gap-2">
                                <span class="bg-purple-500 indicator"></span>
                                <p>Closed</p>
                            </div>
                        </div>
                    </div>

                    <div id="all-issues" class="issues-section grid bg-gray-100 p-6">
                        
                    </div>
                </div>
                
                <input type="radio" name="status_tabs" class="tab" aria-label="Open" />
                <div class="tab-content bg-base-100 border-base-300">
                    <div id="open-tab-overview" class="flex flex-col-reverse gap-1 sm:flex-row sm:justify-between p-3 border-transparent border-1 border-b-gray-300">
                        <div class="issue-count-section">
                            <div class="section-img">
                                <img alt="" src="./assets/Aperture.png"/>
                            </div>
                            <div class="section-content">
                                <h3 class="font-semibold text-lg"><span id="all-issue-count">5</span> issues</h3>
                                <p>Track and manage your project issues</p>
                            </div>
                        </div>
                        <div class="status-section flex self-end sm:self-center gap-4">
                            <div class="status-open flex items-center gap-2">
                                <span class="bg-green-500 indicator"></span>
                                <p>Open</p>
                            </div>
                            <div class="status-closed flex items-center gap-2">
                                <span class="bg-purple-500 indicator"></span>
                                <p>Closed</p>
                            </div>
                        </div>
                    </div>
                    
                    <div id="open-issues" class="issues-section bg-gray-100 p-6">
                        
                    </div>
                </div>

                <input type="radio" name="status_tabs" class="tab" aria-label="Closed" />
                <div class="tab-content bg-base-100 border-base-300">
                    <div id="closed-tab-overview" class="flex flex-col-reverse gap-1 sm:flex-row sm:justify-between p-3 border-transparent border-1 border-b-gray-300">
                        <div class="issue-count-section">
                            <div class="section-img">
                                <img alt="" src="./assets/Aperture.png"/>
                            </div>
                            <div class="section-content">
                                <h3 class="font-semibold text-lg"><span id="all-issue-count">8</span> issues</h3>
                                <p>Track and manage your project issues</p>
                            </div>
                        </div>
                        <div class="status-section flex self-end sm:self-center gap-4">
                            <div class="status-open flex items-center gap-2">
                                <span class="bg-green-500 indicator"></span>
                                <p>Open</p>
                            </div>
                            <div class="status-closed flex items-center gap-2">
                                <span class="bg-purple-500 indicator"></span>
                                <p>Closed</p>
                            </div>
                        </div>
                    </div>
                    
                    <div id="closed-issues" class="issues-section bg-gray-100 p-6">
                        
                    </div>
                </div>
            </div>
            <script src="./scripts/issues.js"></script>
        </main>
    </body>

</html>
